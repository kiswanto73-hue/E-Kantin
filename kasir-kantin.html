<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO KASIR - E-Kantin SDN 169</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen">
    <div class="max-w-5xl mx-auto p-4">
        <div class="flex justify-between items-center mb-6">
            <div class="bg-indigo-900 p-6 rounded-[2rem] text-white shadow-xl flex-1 mr-4 border-b-4 border-yellow-400">
                <h1 class="text-xl font-black italic uppercase text-yellow-400">PRO KASIR 🚀</h1>
                <p class="text-[9px] font-bold opacity-60 uppercase tracking-widest italic">Scanner Bluetooth & WA Gateway: AKTIF</p>
            </div>
            <button onclick="window.location.href='index.html'" class="bg-white p-6 rounded-[2rem] shadow font-black text-indigo-900 text-xs border-2 border-slate-100">PORTAL</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2" id="menuContainer">
                <p class="text-center py-10 text-slate-400 font-bold italic">Memuat menu kantin...</p>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl sticky top-4 border-t-8 border-indigo-600">
                    <h2 class="text-center font-black text-slate-400 text-[10px] mb-4 uppercase tracking-[0.2em]">Daftar Belanja</h2>
                    <div id="cartItems" class="space-y-2 mb-4 max-h-[300px] overflow-y-auto italic border-b border-dashed pb-4 text-xs font-bold text-slate-600"></div>
                    
                    <div class="py-4 mb-4">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-black text-slate-400 uppercase">Total Bayar</span>
                            <span id="totalHarga" class="text-2xl font-black text-indigo-600">Rp 0</span>
                        </div>
                    </div>

                    <div id="scannerArea" class="hidden mb-4">
                        <div id="reader" class="rounded-2xl overflow-hidden border-4 border-indigo-50 shadow-inner"></div>
                        <p class="text-center text-[8px] font-bold text-red-500 mt-2 uppercase">Arahkan Kamera ke QR Card Siswa</p>
                    </div>

                    <button id="btnCheckout" onclick="bukaScanner()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase text-xs tracking-widest">BAYAR SEKARANG ✅</button>
                    <button onclick="resetCart()" class="w-full mt-3 text-slate-300 hover:text-red-400 font-bold text-[9px] uppercase transition-colors">Kosongkan Keranjang</button>
                    
                    <div class="mt-4 p-3 bg-slate-50 rounded-xl border border-dashed border-slate-200">
                        <p class="text-[8px] text-center text-slate-400 font-bold uppercase">Tips: Bisa langsung scan kartu dengan alat Bluetooth tanpa klik tombol</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUjE8WXa8Py4vnojrXDUR3uCvnQEzP6zQ",
            authDomain: "e-kantin-91f0c.firebaseapp.com",
            databaseURL: "https://e-kantin-91f0c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "e-kantin-91f0c",
            storageBucket: "e-kantin-91f0c.firebasestorage.app",
            messagingSenderId: "981834126006",
            appId: "1:981834126006:web:dac8bb0ec1da90549b4c17"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cart = []; 
        let total = 0;
        const FONNTE_TOKEN = "eRiRwGfU96GqAyaMXM7Q"; 

        // 1. LOAD MENU - MENGGUNAKAN .ON AGAR STOK SELALU UPDATE REALTIME
        function loadMenu() {
            db.ref('kantin_menus').on('value', snap => {
                const container = document.getElementById('menuContainer'); 
                container.innerHTML = "";
                snap.forEach(stanSnap => {
                    let html = `<div class="bg-white p-5 rounded-[2.5rem] shadow-sm mb-6 border border-slate-50">
                                    <h3 class="text-[11px] font-black text-indigo-600 uppercase mb-4 flex items-center gap-2">
                                        <span class="bg-indigo-100 p-1 px-2 rounded-lg">🏪</span> ${stanSnap.key}
                                    </h3>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">`;
                    stanSnap.forEach(mSnap => {
                        const m = mSnap.val();
                        const sisa = (m.stok_awal - (m.terjual || 0));
                        const isHabis = sisa <= 0;

                        html += `
                            <button onclick="${isHabis ? "alert('Stok Habis!')" : `addToCart('${stanSnap.key}','${m.nama}',${m.harga},'${mSnap.key}')`}" 
                                class="${isHabis ? 'opacity-30 grayscale cursor-not-allowed bg-slate-200' : 'bg-slate-50 hover:bg-indigo-50'} p-4 rounded-2xl flex justify-between items-center border border-transparent">
                                <div class="text-left">
                                    <p class="text-[11px] font-black uppercase ${isHabis ? 'line-through' : 'text-slate-700'}">${m.nama}</p>
                                    <p class="text-xs font-bold text-emerald-600 italic">Rp ${m.harga.toLocaleString()}</p>
                                </div>
                                <div class="text-right">
                                    <span class="text-[9px] font-black ${sisa < 5 ? 'text-red-500' : 'text-slate-400'} uppercase">
                                        ${isHabis ? 'HABIS' : 'Sisa: ' + sisa}
                                    </span>
                                </div>
                            </button>`;
                    });
                    container.innerHTML += html + `</div></div>`;
                });
            });
        }

        function addToCart(stan, nama, harga, idMenu) { 
            cart.push({ stan, nama, harga, idMenu }); 
            updateCartDisplay(); 
        }

        function updateCartDisplay() {
            const cont = document.getElementById('cartItems'); 
            cont.innerHTML = ""; total = 0;
            cart.forEach((item, index) => { 
                total += item.harga; 
                cont.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-2 rounded-xl border border-slate-100">
                        <p class="uppercase">${item.nama}</p>
                        <button onclick="removeItem(${index})" class="text-red-500 font-bold px-2">×</button>
                    </div>`; 
            });
            document.getElementById('totalHarga').innerText = "Rp " + total.toLocaleString();
        }

        function removeItem(idx) { cart.splice(idx,1); updateCartDisplay(); }
        function resetCart() { cart = []; updateCartDisplay(); }

        // 2. PROSES BAYAR - LOGIKA ANTI-LAG & VALIDASI STOK KETAT
        async function prosesBayar(idSiswa) {
            if(cart.length === 0) return alert("Pilih menu dulu!");
            
            const btn = document.getElementById('btnCheckout');
            if (btn.disabled) return; // Mencegah klik ganda jika proses sedang jalan

            btn.innerText = "SEDANG MEMPROSES..."; 
            btn.disabled = true; // Kunci tombol segera

            const trimmedId = idSiswa.trim();
            
            try {
                // Ambil data user
                const userSnap = await db.ref('kantin_users/' + trimmedId).once('value');
                const user = userSnap.val();

                if(!user) throw new Error("KARTU TIDAK DIKENAL!");
                if(user.saldo < total) throw new Error("SALDO KURANG! Sisa: Rp " + user.saldo.toLocaleString());

                // Validasi & Update Stok menggunakan Firebase Transaction (Anti-Lag & Anti-Double)
                for (let item of cart) {
                    let stokError = null;
                    await db.ref(`kantin_menus/${item.stan}/${item.idMenu}`).transaction((menu) => {
                        if (menu) {
                            const sisa = (menu.stok_awal || 0) - (menu.terjual || 0);
                            if (sisa <= 0) {
                                stokError = `Maaf, ${item.nama} baru saja habis!`;
                                return; // Batalkan transaksi stok
                            }
                            menu.terjual = (menu.terjual || 0) + 1;
                        }
                        return menu;
                    });
                    if (stokError) throw new Error(stokError);
                }

                // Jika stok aman, potong saldo
                const saldoBaru = user.saldo - total;
                await db.ref('kantin_users/' + trimmedId + '/saldo').set(saldoBaru);

                // Catat Laporan
                const waktu = new Date().toLocaleString('id-ID');
                const itemNames = cart.map(i => i.nama).join(", ");
                await db.ref('kantin_laporan').push({ 
                    idSiswa: trimmedId, 
                    namaSiswa: user.nama, 
                    total, 
                    item: itemNames, 
                    waktu 
                });

                // Kirim WA jika ada nomornya
                if (user.wa) {
                    const detailWA = cart.map(i => `- ${i.nama} (Rp ${i.harga.toLocaleString()})`).join("\n");
                    const pesan = `*STRUK DIGITAL SDN 169*\nNama: *${user.nama}*\n\n${detailWA}\n*Total: Rp ${total.toLocaleString()}*\n*Sisa Saldo: Rp ${saldoBaru.toLocaleString()}*`;
                    const fd = new FormData();
                    fd.append('target', user.wa); fd.append('message', pesan);
                    fetch('https://api.fonnte.com/send', { method:'POST', headers:{'Authorization':FONNTE_TOKEN}, body:fd });
                }

                alert(`✅ BERHASIL!\nSiswa: ${user.nama}\nSisa Saldo: Rp ${saldoBaru.toLocaleString()}`);
                resetCart();

            } catch (err) {
                alert("❌ GAGAL: " + err.message);
            } finally {
                btn.innerText = "BAYAR SEKARANG ✅"; 
                btn.disabled = false; // Buka kembali tombol setelah selesai
            }
        }

        // 3. SCANNER BLUETOOTH
        let barcodeBuffer = "";
        let lastKeyTime = Date.now();
        window.addEventListener("keydown", (e) => {
            const currentTime = Date.now();
            if (currentTime - lastKeyTime > 100) barcodeBuffer = "";
            if (e.key === "Enter") {
                if (barcodeBuffer.length > 0) { prosesBayar(barcodeBuffer); barcodeBuffer = ""; }
            } else if (e.key.length === 1) { barcodeBuffer += e.key; }
            lastKeyTime = currentTime;
        });

        function bukaScanner() {
            if(cart.length === 0) return alert("Pilih menu dulu!");
            document.getElementById('scannerArea').classList.remove('hidden');
            const sc = new Html5Qrcode("reader");
            sc.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (id) => {
                sc.stop().then(() => {
                    document.getElementById('scannerArea').classList.add('hidden');
                    prosesBayar(id);
                });
            });
        }

        loadMenu();
    </script>
</body>
</html>
