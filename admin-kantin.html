<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusat Kendali Admin - SDN 165 TJB</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-100 p-2 md:p-6 font-sans">

    <div class="max-w-7xl mx-auto">
        <div class="bg-indigo-900 text-white p-6 rounded-[2.5rem] shadow-xl mb-6 flex flex-col md:flex-row justify-between items-center gap-4 border-b-4 border-yellow-400">
            <div class="flex items-center gap-3">
                <div class="bg-white/10 p-3 rounded-2xl text-xl">📊</div>
                <div>
                    <h1 class="text-xl font-black italic uppercase leading-none">PUSAT KENDALI E-KANTIN</h1>
                    <p class="text-[10px] font-bold text-indigo-300 uppercase mt-1">SDN 165 Tanjung Jabung Barat</p>
                </div>
            </div>
            <div class="flex gap-2">
                <a href="atur-menu.html" class="bg-emerald-500 hover:bg-emerald-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase text-white shadow-lg transition-all">Atur Menu 🍱</a>
                <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase text-white shadow-lg">Keluar</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border-t-4 border-emerald-500">
                <h3 class="text-[9px] font-black text-slate-400 uppercase mb-1">Total Omzet (Belanja)</h3>
                <p id="totalOmzet" class="text-2xl font-black text-slate-800">Rp 0</p>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border-t-4 border-indigo-600">
                <h3 class="text-[9px] font-black text-slate-400 uppercase mb-1">Total Tabungan Utama</h3>
                <p id="totalDeposit" class="text-2xl font-black text-indigo-700">Rp 0</p>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border-t-4 border-orange-500">
                <h3 class="text-[9px] font-black text-slate-400 uppercase mb-1">Total Saldo Harian</h3>
                <p id="totalSaldoHarianSiswa" class="text-2xl font-black text-orange-600">Rp 0</p>
            </div>
            <div class="bg-white p-4 rounded-[2rem] shadow-sm lg:col-span-2 border-t-4 border-indigo-900">
                <h3 class="text-[9px] font-black text-slate-400 uppercase mb-2 text-center italic">Monitor Stok (Awal vs Sisa)</h3>
                <div class="w-full h-[120px]"><canvas id="chartMenu"></canvas></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                    <h3 class="text-[10px] font-black text-indigo-600 mb-4 uppercase italic">Input / Update Data Siswa</h3>
                    <div class="space-y-3">
                        <input type="text" id="idSiswa" placeholder="ID Kartu / NIS" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xs outline-none focus:ring-2 ring-indigo-500">
                        <input type="text" id="namaSiswa" placeholder="Nama Lengkap" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xs outline-none uppercase focus:ring-2 ring-indigo-500">
                        <select id="kelasSiswa" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xs outline-none">
                            <option value="">-- Pilih Kelas --</option>
                            <option value="Kelas 1">Kelas 1</option><option value="Kelas 2">Kelas 2</option>
                            <option value="Kelas 3">Kelas 3</option><option value="Kelas 4">Kelas 4</option>
                            <option value="Kelas 5">Kelas 5</option><option value="Kelas 6">Kelas 6</option>
                            <option value="GURU">Guru / Staf</option>
                        </select>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[8px] font-bold text-slate-400 ml-2 uppercase">Tabungan</label>
                                <input type="number" id="saldoSiswa" placeholder="0" class="w-full p-4 bg-emerald-50 rounded-2xl font-bold text-xs text-emerald-600 outline-none">
                            </div>
                            <div>
                                <label class="text-[8px] font-bold text-orange-400 ml-2 uppercase">Harian</label>
                                <input type="number" id="saldoHarian" placeholder="0" class="w-full p-4 bg-orange-50 rounded-2xl font-bold text-xs text-orange-600 outline-none">
                            </div>
                        </div>
                        <input type="text" id="waSiswa" placeholder="No WA (628...)" class="w-full p-4 bg-indigo-50 rounded-2xl font-bold text-xs outline-none">
                        <button onclick="updateSiswa()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase text-[10px] active:scale-95 transition-all">Simpan Data</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border overflow-hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase italic">Riwayat Hari Ini</h3>
                        <div class="flex gap-2">
                             <button onclick="downloadLaporan()" class="bg-green-600 text-white px-3 py-1 rounded-lg text-[8px] font-black uppercase">Excel</button>
                             <input type="date" id="filterTanggal" onchange="loadData()" class="p-2 bg-slate-100 rounded-lg text-[10px] font-bold outline-none">
                        </div>
                    </div>
                    <div class="overflow-x-auto max-h-[250px]">
                        <table class="w-full text-[10px] text-left" id="tabelLaporan">
                            <thead class="bg-slate-50 sticky top-0">
                                <tr class="text-slate-400 border-b">
                                    <th class="p-3">Waktu</th>
                                    <th>Siswa</th>
                                    <th>Item</th>
                                    <th class="text-right p-3">Total</th>
                                </tr>
                            </thead>
                            <tbody id="logTableBody" class="divide-y divide-slate-50 font-bold italic"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2rem] shadow-sm border overflow-hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase italic">Daftar Akun Siswa</h3>
                        <select id="filterKelas" onchange="loadData()" class="p-2 bg-indigo-600 text-white rounded-xl text-[10px] font-black outline-none">
                            <option value="SEMUA">SEMUA KELAS</option>
                            <option value="Kelas 1">Kelas 1</option><option value="Kelas 2">Kelas 2</option>
                            <option value="Kelas 3">Kelas 3</option><option value="Kelas 4">Kelas 4</option>
                            <option value="Kelas 5">Kelas 5</option><option value="Kelas 6">Kelas 6</option>
                            <option value="GURU">GURU/STAF</option>
                        </select>
                    </div>
                    <div id="siswaList" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[300px] overflow-y-auto p-1"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCUjE8WXa8Py4vnojrXDUR3uCvnQEzP6zQ",
            authDomain: "e-kantin-91f0c.firebaseapp.com",
            databaseURL: "https://e-kantin-91f0c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "e-kantin-91f0c",
            storageBucket: "e-kantin-91f0c.firebasestorage.app",
            messagingSenderId: "981834126006",
            appId: "1:981834126006:web:dac8bb0ec1da90549b4c17"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        let myChart = null;

        // AUTH & INISIALISASI
        auth.onAuthStateChanged(user => {
            if (user) { 
                loadData(); 
                loadStokChart(); // Menjalankan grafik batang dari kantin_menus
            } else { 
                window.location.href = "login.html"; 
            }
        });

        // GRAFIK BATANG SINKRON KE KANTIN_MENUS
        function loadStokChart() {
            db.ref('kantin_menus').on('value', snapshot => {
                let labels = [];
                let dataAwal = [];
                let dataSisa = [];

                snapshot.forEach(stanSnap => {
                    stanSnap.forEach(menuSnap => {
                        const m = menuSnap.val();
                        labels.push(m.nama);
                        dataAwal.push(Number(m.stok_awal) || 0);
                        // Sisa stok dihitung dari stok_awal - terjual
                        const sisa = (Number(m.stok_awal) || 0) - (Number(m.terjual) || 0);
                        dataSisa.push(sisa < 0 ? 0 : sisa);
                    });
                });

                const ctx = document.getElementById('chartMenu').getContext('2d');
                if (myChart) myChart.destroy();
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Stok Pagi', data: dataAwal, backgroundColor: '#cbd5e1', borderRadius: 5, barThickness: 12 },
                            { label: 'Sisa Stok', data: dataSisa, backgroundColor: '#4338ca', borderRadius: 5, barThickness: 12 }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 7, weight: 'bold' } } } },
                        scales: { 
                            y: { beginAtZero: true, ticks: { font: { size: 8 } }, grid: { display: false } },
                            x: { ticks: { font: { size: 7 }, autoSkip: false, maxRotation: 45, minRotation: 45 }, grid: { display: false } } 
                        }
                    }
                });
            });
        }

        // FUNGSI UPDATE SISWA
        function updateSiswa() {
            const id = document.getElementById('idSiswa').value.trim();
            const nm = document.getElementById('namaSiswa').value.toUpperCase().trim();
            const kl = document.getElementById('kelasSiswa').value;
            const sl = parseInt(document.getElementById('saldoSiswa').value) || 0;
            const hr = parseInt(document.getElementById('saldoHarian').value) || 0;
            const wa = document.getElementById('waSiswa').value.trim();
            
            if(!id || !nm || !kl) return alert("Lengkapi ID, Nama, dan Kelas!");

            db.ref('kantin_users/' + id).set({
                id, nama: nm, kelas: kl, saldo: sl, saldo_harian: hr, wa: wa
            }).then(() => {
                alert("Data berhasil disimpan!");
                ['idSiswa','namaSiswa','saldoSiswa','saldoHarian','waSiswa'].forEach(el => document.getElementById(el).value = "");
            });
        }

        // FUNGSI LOAD DATA UTAMA
        function loadData() {
            const fTgl = document.getElementById('filterTanggal').value;
            const fKls = document.getElementById('filterKelas').value;

            // Load Akun Siswa
            db.ref('kantin_users').on('value', snap => {
                let totalTabungan = 0;
                const cont = document.getElementById('siswaList'); cont.innerHTML = "";
                snap.forEach(s => {
                    const d = s.val();
                    totalTabungan += (Number(d.saldo) || 0);
                    if(fKls === "SEMUA" || d.kelas === fKls) {
                        cont.innerHTML += `
                        <div class="p-3 bg-white rounded-2xl flex justify-between items-center border border-slate-200">
                            <div>
                                <span class="bg-indigo-600 text-white text-[7px] font-black px-2 py-0.5 rounded-md">${d.kelas}</span>
                                <p class="text-[10px] font-black text-slate-700 uppercase mt-1 leading-none">${d.nama}</p>
                                <div class="flex gap-2 mt-1 font-bold text-[9px]">
                                    <span class="text-emerald-600">D: ${Number(d.saldo).toLocaleString()}</span>
                                    <span class="text-orange-500">H: ${Number(d.saldo_harian).toLocaleString()}</span>
                                </div>
                            </div>
                            <button onclick="isiForm('${d.id}','${d.nama}','${d.kelas}',${d.saldo},'${d.wa||''}',${d.saldo_harian||0})" class="p-2 bg-indigo-50 text-indigo-600 rounded-lg text-[8px] font-black">EDIT</button>
                        </div>`;
                    }
                });
                document.getElementById('totalDeposit').innerText = "Rp " + totalTabungan.toLocaleString();
            });

            // Load Laporan & Omzet
            db.ref('kantin_laporan').on('value', snap => {
                const body = document.getElementById('logTableBody'); body.innerHTML = "";
                let omzet = 0; let topup = 0;
                snap.forEach(l => {
                    const d = l.val();
                    const pts = d.waktu.split(',')[0].split('/');
                    const tgl = (pts.length === 3) ? `${pts[2]}-${pts[1].padStart(2,'0')}-${pts[0].padStart(2,'0')}` : d.waktu.split(' ')[0];
                    if (!fTgl || tgl === fTgl) {
                        if (d.item && d.item.includes("TOP UP")) topup += (Number(d.total) || 0);
                        else if (d.item !== "TARIK TUNAI") omzet += (Number(d.total) || 0);
                        const c = (d.item && d.item.includes("TOP UP")) ? "text-orange-500" : "text-indigo-600";
                        body.innerHTML = `<tr><td class="p-3 text-slate-400">${d.waktu}</td><td class="uppercase">${d.namaSiswa}</td><td class="${c} font-black uppercase italic">${d.item || 'BELANJA'}</td><td class="text-right p-3 text-green-600 font-black">Rp ${Number(d.total).toLocaleString()}</td></tr>` + body.innerHTML;
                    }
                });
                document.getElementById('totalOmzet').innerText = "Rp " + omzet.toLocaleString();
                document.getElementById('totalSaldoHarianSiswa').innerText = "Rp " + topup.toLocaleString();
            });
        }

        function isiForm(id, nm, kl, sl, wa, hr) { 
            document.getElementById('idSiswa').value = id; document.getElementById('namaSiswa').value = nm; 
            document.getElementById('kelasSiswa').value = kl; document.getElementById('saldoSiswa').value = sl; 
            document.getElementById('saldoHarian').value = hr || 0; document.getElementById('waSiswa').value = wa; 
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        function logout() { auth.signOut().then(() => location.href = "login.html"); }
        function downloadLaporan() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("tabelLaporan")), `Laporan_Harian.xlsx`); }
        function downloadSaldo() {
            db.ref('kantin_users').once('value', snap => {
                let list = []; snap.forEach(s => { list.push({ 'NAMA': s.val().nama, 'KELAS': s.val().kelas, 'SALDO': s.val().saldo, 'HARIAN': s.val().saldo_harian }); });
                const ws = XLSX.utils.json_to_sheet(list); const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Saldo"); XLSX.writeFile(wb, "Data_Saldo_Siswa.xlsx");
            });
        }
    </script>
</body>
</html>
