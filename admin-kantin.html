<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCUjE8WXa8Py4vnojrXDUR3uCvnQEzP6zQ",
        authDomain: "e-kantin-91f0c.firebaseapp.com",
        databaseURL: "https://e-kantin-91f0c-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "e-kantin-91f0c",
        storageBucket: "e-kantin-91f0c.firebasestorage.app",
        messagingSenderId: "981834126006",
        appId: "1:981834126006:web:dac8bb0ec1da90549b4c17"
    };
    firebase.initializeApp(firebaseConfig);
    
    // --- PERSISTENCE DICABUT AGAR TIDAK LAG ---
    // firebase.database().enablePersistence(); 

    const db = firebase.database();
    const auth = firebase.auth();
    let myChart = null;

    auth.onAuthStateChanged(user => {
        if (user) { loadData(); } else { window.location.href = "login.html"; }
    });

    // FUNGSI LOAD DATA YANG DIOPTIMASI
    function loadData() {
        const filterTgl = document.getElementById('filterTanggal').value;
        const filterKls = document.getElementById('filterKelas').value;
        
        // 1. Ambil Data Siswa (Gunakan .once agar ringan)
        db.ref('kantin_users').once('value').then(snap => {
            let totalSmuaDeposit = 0;
            let totalSmuaHarian = 0; 
            const cont = document.getElementById('siswaList'); cont.innerHTML = "";
            
            snap.forEach(s => {
                const d = s.val();
                totalSmuaDeposit += (d.saldo || 0);
                totalSmuaHarian += (d.saldo_harian || 0); 

                if(filterKls === "SEMUA" || d.kelas === filterKls) {
                    cont.innerHTML += `
                        <div class="p-3 bg-white rounded-2xl flex justify-between items-center border border-slate-200 shadow-sm">
                            <div>
                                <span class="bg-indigo-600 text-white text-[7px] font-black px-2 py-0.5 rounded-md uppercase">${d.kelas}</span>
                                <p class="text-[10px] font-black text-slate-700 uppercase mt-1 leading-none">${d.nama}</p>
                                <div class="flex gap-2 mt-1">
                                    <p class="text-[9px] font-bold text-emerald-600">Dep: Rp ${(d.saldo || 0).toLocaleString()}</p>
                                    <p class="text-[9px] font-bold text-orange-500">Day: Rp ${(d.saldo_harian || 0).toLocaleString()}</p>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="isiForm('${d.id}','${d.nama}','${d.kelas}',${d.saldo},'${d.wa || ''}',${d.saldo_harian || 0})" class="p-2 bg-indigo-600 text-white rounded-lg text-[8px] font-black">EDIT</button>
                                <button onclick="hapusSiswa('${d.id}')" class="p-2 bg-red-100 text-red-500 rounded-lg text-[8px]">×</button>
                            </div>
                        </div>`;
                }
            });
            document.getElementById('totalDeposit').innerText = "Rp " + totalSmuaDeposit.toLocaleString();
            document.getElementById('totalSaldoHarianSiswa').innerText = "Rp " + totalSmuaHarian.toLocaleString(); 
        });

        // 2. Ambil Laporan (Gunakan limit agar tidak overload)
        db.ref('kantin_laporan').limitToLast(200).once('value').then(snap => {
            const body = document.getElementById('logTableBody'); body.innerHTML = "";
            let totalSmua = 0; let stanGrup = {};
            
            snap.forEach(l => {
                const d = l.val();
                const pts = d.waktu.split(',')[0].split('/');
                const tglData = (pts.length === 3) ? `${pts[2]}-${pts[1].padStart(2,'0')}-${pts[0].padStart(2,'0')}` : d.waktu.split(' ')[0];

                if (!filterTgl || tglData === filterTgl) {
                    if (d.item !== "TARIK TUNAI" && d.item !== "TOP UP HARIAN") {
                        totalSmua += d.total;
                        let namaStanKategori = d.stan || d.admin || "UMUM";
                        stanGrup[namaStanKategori] = (stanGrup[namaStanKategori] || 0) + d.total;
                    }

                    const itemColor = d.item === "TOP UP HARIAN" ? "text-orange-500" : "text-indigo-600";
                    body.innerHTML = `<tr>
                        <td class="p-3 text-slate-400 font-normal">${d.waktu}</td>
                        <td>${d.namaSiswa}</td>
                        <td class="text-slate-500 font-bold">${d.kelas || '-'}</td>
                        <td class="${itemColor} font-black text-[9px] uppercase italic">${d.item || 'Pembelian'}</td>
                        <td class="text-right p-3 text-green-600 font-black">Rp ${d.total.toLocaleString()}</td>
                    </tr>` + body.innerHTML;
                }
            });
            document.getElementById('totalOmzet').innerText = "Rp " + totalSmua.toLocaleString();
            updateChart(stanGrup);
        });
    }
    
    // ... Fungsi updateSiswa, updateChart, dll tetap sama di bawah ini ...
</script>
