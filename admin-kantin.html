<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusat Kendali Admin - SDN 165 TJB</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-100 p-2 md:p-6 font-sans">

    <div class="max-w-7xl mx-auto">
        <div class="bg-indigo-900 text-white p-6 rounded-[2.5rem] shadow-xl mb-6 flex flex-col md:flex-row justify-between items-center gap-4 border-b-4 border-yellow-400">
            <div class="flex items-center gap-3">
                <div class="bg-white/10 p-3 rounded-2xl text-xl">📊</div>
                <div>
                    <h1 class="text-xl font-black italic uppercase leading-none">PUSAT KENDALI E-KANTIN</h1>
                    <p class="text-[10px] font-bold text-indigo-300 uppercase mt-1">SDN 165 Tanjung Jabung Barat</p>
                </div>
            </div>
            <div class="flex gap-2">
                <a href="index.html" class="bg-white/10 px-4 py-2 rounded-xl text-[10px] font-bold uppercase text-white">Portal</a>
                <button onclick="resetTransaksiHarian()" class="bg-orange-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase text-white shadow-lg hover:bg-orange-600 transition-all">Reset Transaksi ⚠️</button>
                <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase text-white shadow-lg">Keluar</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border-t-4 border-emerald-500">
                <h3 class="text-[9px] font-black text-slate-400 uppercase mb-1">Total Omzet (Belanja)</h3>
                <p id="totalOmzet" class="text-2xl font-black text-slate-800">Rp 0</p>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border-t-4 border-indigo-600">
                <h3 class="text-[9px] font-black text-slate-400 uppercase mb-1">Total Tabungan Utama</h3>
                <p id="totalDeposit" class="text-2xl font-black text-indigo-700">Rp 0</p>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border-t-4 border-orange-500">
                <h3 class="text-[9px] font-black text-slate-400 uppercase mb-1">Total Jatah Harian</h3>
                <p id="totalSaldoHarianSiswa" class="text-2xl font-black text-orange-600">Rp 0</p>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border-t-4 border-slate-800 text-center flex flex-col gap-2 justify-center">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="downloadLaporan()" class="bg-green-600 text-white p-2 rounded-xl text-[8px] font-black uppercase">Excel Laporan</button>
                    <button onclick="downloadSaldo()" class="bg-emerald-500 text-white p-2 rounded-xl text-[8px] font-black uppercase">Excel Saldo</button>
                </div>
                <button onclick="cetakKolektif()" class="bg-slate-800 text-white p-2 rounded-xl text-[9px] font-black uppercase w-full">Cetak Kartu Portrait 🖨️</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                    <h3 class="text-[10px] font-black text-indigo-600 mb-4 uppercase">Input / Update Data</h3>
                    <div class="space-y-3">
                        <input type="text" id="idSiswa" placeholder="ID Kartu / NIS" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xs outline-none focus:ring-2 ring-indigo-500">
                        <input type="text" id="namaSiswa" placeholder="Nama Lengkap" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xs outline-none uppercase focus:ring-2 ring-indigo-500">
                        <select id="kelasSiswa" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xs outline-none">
                            <option value="">-- Pilih Kelas --</option>
                            <option value="Kelas 1">Kelas 1</option><option value="Kelas 2">Kelas 2</option>
                            <option value="Kelas 3">Kelas 3</option><option value="Kelas 4">Kelas 4</option>
                            <option value="Kelas 5">Kelas 5</option><option value="Kelas 6">Kelas 6</option>
                            <option value="GURU">Guru / Staf</option>
                            <option value="TAMU">TAMU / UMUM</option>
                        </select>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[8px] font-bold text-slate-400 ml-2">TABUNGAN UTAMA</label>
                                <input type="number" id="saldoSiswa" placeholder="0" class="w-full p-4 bg-emerald-50 rounded-2xl font-bold text-xs text-emerald-600 outline-none">
                            </div>
                            <div>
                                <label class="text-[8px] font-bold text-orange-400 ml-2">JATAH HARIAN</label>
                                <input type="number" id="saldoHarian" placeholder="0" class="w-full p-4 bg-orange-50 rounded-2xl font-bold text-xs text-orange-600 outline-none">
                            </div>
                        </div>
                        <input type="text" id="waSiswa" placeholder="No WA (628...)" class="w-full p-4 bg-indigo-50 rounded-2xl font-bold text-xs outline-none">
                        <button onclick="updateSiswa()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase text-[10px] tracking-widest active:scale-95">Simpan Data</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase">Monitoring Stok Menu</h3>
                        <button onclick="loadStokChart()" class="text-[9px] bg-indigo-600 text-white px-3 py-1 rounded-full font-bold hover:bg-indigo-700 transition-all">REFRESH GRAFIK 🔄</button>
                    </div>
                    <div class="w-full h-[300px]">
                        <canvas id="chartStok"></canvas>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2rem] shadow-sm border overflow-hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase">Riwayat Transaksi</h3>
                        <input type="date" id="filterTanggal" onchange="loadData()" class="p-2 bg-slate-100 rounded-lg text-[10px] font-bold outline-none">
                    </div>
                    <div class="overflow-x-auto max-h-[400px]">
                        <table class="w-full text-[10px] text-left" id="tabelLaporan">
                            <thead class="bg-slate-50 sticky top-0">
                                <tr class="text-slate-400 border-b">
                                    <th class="p-3">Waktu</th>
                                    <th>Siswa</th>
                                    <th>Kelas</th>
                                    <th>Item</th>
                                    <th class="text-right p-3">Total</th>
                                </tr>
                            </thead>
                            <tbody id="logTableBody" class="divide-y divide-slate-50 font-bold italic"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2rem] shadow-sm border overflow-hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase">Daftar Akun</h3>
                        <select id="filterKelas" onchange="loadData()" class="p-2 bg-indigo-600 text-white rounded-xl text-[10px] font-black outline-none">
                            <option value="SEMUA">SEMUA KELAS</option>
                            <option value="Kelas 1">Kelas 1</option><option value="Kelas 2">Kelas 2</option>
                            <option value="Kelas 3">Kelas 3</option><option value="Kelas 4">Kelas 4</option>
                            <option value="Kelas 5">Kelas 5</option><option value="Kelas 6">Kelas 6</option>
                            <option value="GURU">GURU/STAF</option>
                            <option value="TAMU">TAMU</option>
                        </select>
                    </div>
                    <div id="siswaList" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[350px] overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCUjE8WXa8Py4vnojrXDUR3uCvnQEzP6zQ",
            authDomain: "e-kantin-91f0c.firebaseapp.com",
            databaseURL: "https://e-kantin-91f0c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "e-kantin-91f0c",
            storageBucket: "e-kantin-91f0c.firebasestorage.app",
            messagingSenderId: "981834126006",
            appId: "1:981834126006:web:dac8bb0ec1da90549b4c17"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        let myChart = null;

        auth.onAuthStateChanged(user => {
            if (user) { loadData(); loadStokChart(); } 
            else { window.location.href = "login.html"; }
        });

        // Fitur Reset Transaksi (Tetap Ada)
        async function resetTransaksiHarian() {
            if (confirm("⚠️ PERINGATAN: Ini akan menghapus SEMUA Riwayat Transaksi. Lanjutkan?")) {
                try {
                    await db.ref('kantin_laporan').remove();
                    const menuSnap = await db.ref('kantin_menus').once('value');
                    menuSnap.forEach(stanSnap => {
                        stanSnap.forEach(itemSnap => {
                            itemSnap.ref.update({ terjual: 0 });
                        });
                    });
                    alert("Berhasil reset hari baru!");
                    loadData(); loadStokChart();
                } catch (e) { alert("Gagal: " + e.message); }
            }
        }

        // Fitur Grafik (Tetap Ada)
        function loadStokChart() {
            db.ref('kantin_menus').once('value').then(snap => {
                let labels = []; let dataAwal = []; let dataSisa = [];
                snap.forEach(stanSnap => {
                    stanSnap.forEach(menuSnap => {
                        const m = menuSnap.val();
                        labels.push(m.nama);
                        const awal = Number(m.stok_awal) || 0;
                        const terjual = Number(m.terjual) || 0;
                        const sisa = awal - terjual;
                        dataAwal.push(awal);
                        dataSisa.push(sisa < 0 ? 0 : sisa);
                    });
                });
                const ctx = document.getElementById('chartStok').getContext('2d');
                if (myChart) myChart.destroy();
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'Stok Awal', data: dataAwal, backgroundColor: '#cbd5e1', borderRadius: 5 },
                            { label: 'Sisa Stok', data: dataSisa, backgroundColor: '#4338ca', borderRadius: 5 }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
                });
            });
        }

        // Fitur Update Siswa (Tetap Ada)
        function updateSiswa() {
            const id = document.getElementById('idSiswa').value.trim();
            const nm = document.getElementById('namaSiswa').value.toUpperCase().trim();
            const kl = document.getElementById('kelasSiswa').value;
            const sl = parseInt(document.getElementById('saldoSiswa').value) || 0;
            const hr = parseInt(document.getElementById('saldoHarian').value) || 0;
            const wa = document.getElementById('waSiswa').value.trim();
            if(!id || !nm || !kl) return alert("Harap isi ID, Nama, dan Kelas!");
            db.ref('kantin_users/' + id).set({ id, nama: nm, kelas: kl, saldo: sl, saldo_harian: hr, wa: wa })
            .then(() => {
                alert("Data berhasil disimpan!");
                ['idSiswa','namaSiswa','saldoSiswa','saldoHarian','waSiswa'].forEach(el => document.getElementById(el).value = "");
            });
        }

        // Fitur Load Data Tabel (Tetap Ada)
        function loadData() {
            const fTgl = document.getElementById('filterTanggal').value;
            const fKls = document.getElementById('filterKelas').value;
            db.ref('kantin_users').on('value', snap => {
                let totalTabungan = 0; const cont = document.getElementById('siswaList'); cont.innerHTML = "";
                snap.forEach(s => {
                    const d = s.val(); totalTabungan += (Number(d.saldo) || 0);
                    if(fKls === "SEMUA" || d.kelas === fKls) {
                        cont.innerHTML += `<div class="p-3 bg-white rounded-2xl flex justify-between items-center border border-slate-200 shadow-sm">
                            <div><span class="bg-indigo-600 text-white text-[7px] font-black px-2 py-0.5 rounded-md uppercase">${d.kelas}</span>
                            <p class="text-[10px] font-black text-slate-700 uppercase mt-1 leading-none">${d.nama}</p>
                            <div class="flex gap-2 mt-1 font-bold text-[9px]"><span class="text-emerald-600">D: Rp ${Number(d.saldo).toLocaleString()}</span>
                            <span class="text-orange-500">H: Rp ${Number(d.saldo_harian).toLocaleString()}</span></div></div>
                            <div class="flex gap-1"><button onclick="isiForm('${d.id}','${d.nama}','${d.kelas}',${d.saldo},'${d.wa||''}',${d.saldo_harian||0})" class="p-2 bg-indigo-100 text-indigo-600 rounded-lg text-[8px] font-black">EDIT</button>
                            <button onclick="hapusSiswa('${d.id}')" class="p-2 bg-red-50 text-red-500 rounded-lg text-[8px]">×</button></div></div>`;
                    }
                });
                document.getElementById('totalDeposit').innerText = "Rp " + totalTabungan.toLocaleString();
            });

            db.ref('kantin_laporan').limitToLast(200).on('value', snap => {
                const body = document.getElementById('logTableBody'); body.innerHTML = "";
                let omzet = 0; let topup = 0;
                snap.forEach(l => {
                    const d = l.val();
                    const pts = d.waktu.split(',')[0].split('/');
                    const tgl = (pts.length === 3) ? `${pts[2]}-${pts[1].padStart(2,'0')}-${pts[0].padStart(2,'0')}` : d.waktu.split(' ')[0];
                    if (!fTgl || tgl === fTgl) {
                        if (d.item && d.item.includes("TOP UP")) { topup += (Number(d.total) || 0); } 
                        else if (d.item !== "TARIK TUNAI") { omzet += (Number(d.total) || 0); }
                        const c = (d.item && d.item.includes("TOP UP")) ? "text-orange-500" : "text-indigo-600";
                        body.innerHTML = `<tr><td class="p-3 text-slate-400 font-normal">${d.waktu}</td>
                            <td class="uppercase">${d.namaSiswa}</td>
                            <td class="text-slate-500 text-[9px] uppercase">${d.kelasSiswa || d.kelas || '-'}</td>
                            <td class="${c} font-black text-[9px] uppercase italic">${d.item || 'BELANJA'}</td>
                            <td class="text-right p-3 text-green-600 font-black">Rp ${Number(d.total).toLocaleString()}</td></tr>` + body.innerHTML;
                    }
                });
                document.getElementById('totalOmzet').innerText = "Rp " + omzet.toLocaleString();
                document.getElementById('totalSaldoHarianSiswa').innerText = "Rp " + topup.toLocaleString();
            });
        }

        function isiForm(id, nm, kl, sl, wa, hr) { 
            document.getElementById('idSiswa').value = id; 
            document.getElementById('namaSiswa').value = nm; 
            document.getElementById('kelasSiswa').value = kl; 
            document.getElementById('saldoSiswa').value = sl; 
            document.getElementById('saldoHarian').value = hr || 0; 
            document.getElementById('waSiswa').value = wa; 
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        function logout() { auth.signOut().then(() => location.href = "login.html"); }
        function hapusSiswa(id) { if(confirm("Hapus?")) db.ref('kantin_users').child(id).remove(); }
        
        // FUNGSI DOWNLOAD EXCEL (DIPERBARUI AGAR KELAS MUNCUL)
        async function downloadLaporan() {
            // 1. Ambil database User dulu untuk dicocokkan kelasnya
            const usersSnap = await db.ref('kantin_users').once('value');
            const userRefKelas = {};
            usersSnap.forEach(u => {
                const userData = u.val();
                // Simpan kelas berdasarkan Nama Siswa sebagai kunci
                userRefKelas[userData.nama] = userData.kelas;
            });

            // 2. Ambil data Laporan
            db.ref('kantin_laporan').once('value', snap => {
                let dataExcel = [];
                snap.forEach(l => {
                    const d = l.val();
                    
                    // Logika: Cari kelas di laporan, jika kosong cari di userRefKelas, jika tetap tidak ada baru kasih '-'
                    const klsFinal = d.kelasSiswa || d.kelas || userRefKelas[d.namaSiswa] || '-';
                    
                    dataExcel.push({
                        'WAKTU': d.waktu,
                        'NAMA': d.namaSiswa,
                        'KELAS': klsFinal,
                        'ITEM': d.item,
                        'TOTAL': d.total
                    });
                });
                const ws = XLSX.utils.json_to_sheet(dataExcel);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Laporan Transaksi");
                XLSX.writeFile(wb, "Laporan_Kantin_Lengkap.xlsx");
            });
        }

        // Fitur Download Saldo (Tetap Ada)
        function downloadSaldo() {
            db.ref('kantin_users').once('value', snap => {
                let list = []; snap.forEach(s => { list.push({ 'NAMA': s.val().nama, 'KELAS': s.val().kelas, 'SALDO': s.val().saldo, 'HARIAN': s.val().saldo_harian }); });
                const ws = XLSX.utils.json_to_sheet(list); const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Saldo"); XLSX.writeFile(wb, "Data_Saldo_Siswa.xlsx");
            });
        }

        // Fitur Cetak Kartu (Tetap Ada)
        function cetakKolektif() {
            const kl = document.getElementById('filterKelas').value;
            const win = window.open('', '_blank');
            win.document.write(`<html><head><title>Cetak</title><style>@page{size:A4;margin:5mm}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.card{width:50mm;height:82mm;border:2px solid #312e81;border-radius:10px;text-align:center;padding:5px;font-family:sans-serif;page-break-inside:avoid}.h{background:#312e81;color:white;padding:5px;font-size:10px}</style></head><body><div class="grid">`);
            db.ref('kantin_users').once('value', snap => {
                snap.forEach(s => {
                    const d = s.val(); if(kl === "SEMUA" || d.kelas === kl) {
                        win.document.write(`<div class="card"><div class="h">SDN 165 TJB</div><div style="margin:10px;height:25mm;border:1px dashed #ccc">FOTO</div><b style="font-size:10px">${d.nama}</b><br><small>${d.kelas}</small><div id="q-${d.id}" style="margin:10px;display:flex;justify-content:center"></div></div>`);
                    }
                });
                win.document.write(`</div><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script><script>`);
                snap.forEach(s => {
                    const d = s.val(); if(kl === "SEMUA" || d.kelas === kl) {
                        win.document.write(`new QRCode(document.getElementById("q-${d.id}"), {text:"${d.id}", width:60, height:60});`);
                    }
                });
                win.document.write(`setTimeout(()=>{window.print()},1000)<\/script></body></html>`);
                win.document.close();
            });
        }
    </script>
</body>
</html>
