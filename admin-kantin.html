<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusat Kendali Admin - SDN 165 TJB</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-100 p-2 md:p-6 font-sans">

    <div class="max-w-7xl mx-auto">
        <div class="bg-indigo-900 text-white p-6 rounded-[2.5rem] shadow-xl mb-6 flex flex-col md:flex-row justify-between items-center gap-4 border-b-4 border-yellow-400">
            <div class="flex items-center gap-3">
                <div class="bg-white/10 p-3 rounded-2xl text-xl">📊</div>
                <div>
                    <h1 class="text-xl font-black italic uppercase leading-none">PUSAT KENDALI E-KANTIN</h1>
                    <p class="text-[10px] font-bold text-indigo-300 uppercase mt-1">SDN 165 Tanjung Jabung Barat</p>
                </div>
            </div>
            <div class="flex gap-2">
                <a href="index.html" class="bg-white/10 px-4 py-2 rounded-xl text-[10px] font-bold uppercase text-white">Portal</a>
                <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase text-white shadow-lg">Keluar</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border-t-4 border-emerald-500">
                <h3 class="text-[9px] font-black text-slate-400 uppercase mb-1">Total Omzet (Belanja)</h3>
                <p id="totalOmzet" class="text-2xl font-black text-slate-800">Rp 0</p>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border-t-4 border-indigo-600">
                <h3 class="text-[9px] font-black text-slate-400 uppercase mb-1">Total Tabungan</h3>
                <p id="totalDeposit" class="text-2xl font-black text-indigo-700">Rp 0</p>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border-t-4 border-orange-500">
                <h3 class="text-[9px] font-black text-slate-400 uppercase mb-1">Total Top Up Harian</h3>
                <p id="totalSaldoHarianSiswa" class="text-2xl font-black text-orange-600">Rp 0</p>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm flex flex-col items-center justify-center">
                <div class="w-full h-[100px]"><canvas id="chartStan"></canvas></div>
            </div>
            <div class="bg-white p-5 rounded-[2rem] shadow-sm border-t-4 border-slate-800 text-center flex flex-col gap-2">
                <button onclick="downloadLaporan()" class="bg-green-600 text-white p-2 rounded-xl text-[9px] font-black uppercase">Excel Transaksi 📄</button>
                <button onclick="downloadSaldo()" class="bg-emerald-500 text-white p-2 rounded-xl text-[9px] font-black uppercase">Excel Saldo 💰</button>
                <button onclick="cetakKolektif()" class="bg-slate-800 text-white p-2 rounded-xl text-[9px] font-black uppercase">Cetak Portrait 🖨️</button>
                <button onclick="resetTransaksi()" class="text-red-500 text-[8px] font-bold italic">Reset Transaksi</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                    <h3 class="text-[10px] font-black text-indigo-600 mb-4 uppercase">Update Siswa & Saldo</h3>
                    <div class="space-y-3">
                        <input type="text" id="idSiswa" placeholder="ID Kartu / NIS" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xs outline-none">
                        <input type="text" id="namaSiswa" placeholder="Nama Lengkap" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xs outline-none uppercase">
                        <select id="kelasSiswa" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xs outline-none">
                            <option value="">-- Pilih Kelas --</option>
                            <option value="Kelas 1">Kelas 1</option><option value="Kelas 2">Kelas 2</option>
                            <option value="Kelas 3">Kelas 3</option><option value="Kelas 4">Kelas 4</option>
                            <option value="Kelas 5">Kelas 5</option><option value="Kelas 6">Kelas 6</option>
                            <option value="GURU">Guru / Staf</option>
                        </select>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[8px] font-bold text-slate-400">TABUNGAN UTAMA</label>
                                <input type="number" id="saldoSiswa" placeholder="Rp" class="w-full p-4 bg-emerald-50 rounded-2xl font-bold text-xs text-emerald-600">
                            </div>
                            <div>
                                <label class="text-[8px] font-bold text-orange-400">JATAH HARIAN</label>
                                <input type="number" id="saldoHarian" placeholder="Rp" class="w-full p-4 bg-orange-50 rounded-2xl font-bold text-xs text-orange-600">
                            </div>
                        </div>
                        <input type="text" id="waSiswa" placeholder="628..." class="w-full p-4 bg-indigo-50 rounded-2xl font-bold text-xs">
                        <button onclick="updateSiswa()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase text-[10px] active:scale-95 transition-all">Simpan Data</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase">Riwayat Pembelian & Top Up</h3>
                        <input type="date" id="filterTanggal" onchange="loadData()" class="p-2 bg-slate-100 rounded-lg text-[10px] font-bold">
                    </div>
                    <div class="overflow-x-auto max-h-[300px]">
                        <table class="w-full text-[10px]" id="tabelLaporan">
                            <thead class="bg-slate-50 sticky top-0">
                                <tr class="text-slate-400 border-b uppercase">
                                    <th class="p-3 text-left">Waktu</th>
                                    <th class="text-left">Siswa</th>
                                    <th class="text-left">Detail</th>
                                    <th class="text-right p-3">Total</th>
                                </tr>
                            </thead>
                            <tbody id="logTableBody" class="divide-y divide-slate-50 font-bold italic"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[2rem] shadow-sm border">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase">Daftar Akun Siswa</h3>
                        <select id="filterKelas" onchange="loadData()" class="p-2 bg-indigo-600 text-white rounded-xl text-[10px] font-black">
                            <option value="SEMUA">SEMUA KELAS</option>
                            <option value="Kelas 1">KELAS 1</option><option value="Kelas 2">KELAS 2</option>
                            <option value="Kelas 3">KELAS 3</option><option value="Kelas 4">KELAS 4</option>
                            <option value="Kelas 5">KELAS 5</option><option value="Kelas 6">KELAS 6</option>
                            <option value="GURU">GURU/STAF</option>
                        </select>
                    </div>
                    <div id="siswaList" class="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-[400px] overflow-y-auto p-1"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUjE8WXa8Py4vnojrXDUR3uCvnQEzP6zQ",
            authDomain: "e-kantin-91f0c.firebaseapp.com",
            databaseURL: "https://e-kantin-91f0c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "e-kantin-91f0c",
            storageBucket: "e-kantin-91f0c.firebasestorage.app",
            messagingSenderId: "981834126006",
            appId: "1:981834126006:web:dac8bb0ec1da90549b4c17"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        let myChart = null;

        auth.onAuthStateChanged(user => { if (user) { loadData(); } else { window.location.href = "login.html"; } });

        function updateSiswa() {
            const id = document.getElementById('idSiswa').value.trim();
            const nm = document.getElementById('namaSiswa').value.toUpperCase().trim();
            const kl = document.getElementById('kelasSiswa').value;
            const sl = parseInt(document.getElementById('saldoSiswa').value) || 0;
            const hr = parseInt(document.getElementById('saldoHarian').value) || 0;
            const wa = document.getElementById('waSiswa').value.trim();
            
            if(!id || !nm || !kl) return alert("Lengkapi data!");

            db.ref('kantin_users/' + id).update({ id, nama: nm, kelas: kl, saldo: sl, saldo_harian: hr, wa }).then(() => { 
                if(hr > 0) {
                    db.ref('kantin_laporan').push({
                        namaSiswa: nm, idSiswa: id, kelas: kl,
                        item: "TOP UP HARIAN", total: hr,
                        waktu: new Date().toLocaleString('id-ID'), admin: "ADMIN"
                    });
                }
                alert("Berhasil!"); 
                location.reload(); // Reload untuk mencegah lag memory
            });
        }

        function loadData() {
            const fTgl = document.getElementById('filterTanggal').value;
            const fKls = document.getElementById('filterKelas').value;

            // Load Users (Sekali Saja agar tidak lag)
            db.ref('kantin_users').once('value', snap => {
                let totalDepo = 0;
                const cont = document.getElementById('siswaList'); cont.innerHTML = "";
                snap.forEach(s => {
                    const d = s.val();
                    totalDepo += (Number(d.saldo) || 0);
                    if(fKls === "SEMUA" || d.kelas === fKls) {
                        cont.innerHTML += `
                            <div class="p-3 bg-white rounded-2xl flex justify-between items-center border border-slate-200">
                                <div>
                                    <span class="bg-indigo-600 text-white text-[7px] font-black px-2 py-0.5 rounded-md">${d.kelas}</span>
                                    <p class="text-[10px] font-black text-slate-700 uppercase mt-1">${d.nama}</p>
                                    <div class="flex gap-2 text-[9px] font-bold">
                                        <span class="text-emerald-600">Dep: Rp ${Number(d.saldo).toLocaleString()}</span>
                                        <span class="text-orange-500">Day: Rp ${Number(d.saldo_harian).toLocaleString()}</span>
                                    </div>
                                </div>
                                <div class="flex gap-1">
                                    <button onclick="isiForm('${d.id}','${d.nama}','${d.kelas}',${d.saldo},'${d.wa||''}',${d.saldo_harian||0})" class="p-2 bg-indigo-600 text-white rounded-lg text-[8px] font-black">EDIT</button>
                                    <button onclick="hapusSiswa('${d.id}')" class="p-2 bg-red-100 text-red-500 rounded-lg text-[8px]">×</button>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('totalDeposit').innerText = "Rp " + totalDepo.toLocaleString();
            });

            // Load Laporan (Realtime)
            db.ref('kantin_laporan').limitToLast(100).on('value', snap => {
                const body = document.getElementById('logTableBody'); body.innerHTML = "";
                let omzet = 0; let topup = 0; let stans = {};

                snap.forEach(l => {
                    const d = l.val();
                    const pts = d.waktu.split(',')[0].split('/');
                    const tgl = (pts.length === 3) ? `${pts[2]}-${pts[1].padStart(2,'0')}-${pts[0].padStart(2,'0')}` : d.waktu.split(' ')[0];

                    if (!fTgl || tgl === fTgl) {
                        if (d.item.includes("TOP UP")) {
                            topup += (Number(d.total) || 0);
                        } else if (d.item !== "TARIK TUNAI") {
                            omzet += (Number(d.total) || 0);
                            let n = d.stan || d.admin || "UMUM";
                            stans[n] = (stans[n] || 0) + (Number(d.total) || 0);
                        }
                        const c = d.item.includes("TOP UP") ? "text-orange-500" : "text-indigo-600";
                        body.innerHTML = `<tr>
                            <td class="p-3 text-slate-400 font-normal">${d.waktu}</td>
                            <td>${d.namaSiswa}</td>
                            <td class="${c} font-black text-[9px] uppercase italic">${d.item}</td>
                            <td class="text-right p-3 text-green-600">Rp ${Number(d.total).toLocaleString()}</td>
                        </tr>` + body.innerHTML;
                    }
                });
                document.getElementById('totalOmzet').innerText = "Rp " + omzet.toLocaleString();
                document.getElementById('totalSaldoHarianSiswa').innerText = "Rp " + topup.toLocaleString();
                updateChart(stans);
            });
        }

        function updateChart(data) {
            const ctx = document.getElementById('chartStan').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: Object.keys(data), datasets: [{ data: Object.values(data), backgroundColor: ['#4338ca', '#f59e0b', '#10b981', '#ef4444'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function isiForm(id, nm, kl, sl, wa, hr) { 
            document.getElementById('idSiswa').value = id; document.getElementById('namaSiswa').value = nm; 
            document.getElementById('kelasSiswa').value = kl; document.getElementById('saldoSiswa').value = sl; 
            document.getElementById('saldoHarian').value = hr || 0; document.getElementById('waSiswa').value = wa; 
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }

        function logout() { auth.signOut().then(() => location.href = "login.html"); }
        function hapusSiswa(id) { if(confirm("Hapus?")) db.ref('kantin_users').child(id).remove().then(()=>location.reload()); }
        function resetTransaksi() { if(confirm("Reset semua riwayat?")) db.ref('kantin_laporan').remove().then(()=>location.reload()); }
        function downloadLaporan() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("tabelLaporan")), `Transaksi.xlsx`); }
        function downloadSaldo() {
            db.ref('kantin_users').once('value', snap => {
                let data = [];
                snap.forEach(s => { data.push({ 'NAMA': s.val().nama, 'KELAS': s.val().kelas, 'TABUNGAN': s.val().saldo, 'HARIAN': s.val().saldo_harian }); });
                XLSX.writeFile(XLSX.utils.book_new(), "Saldo.xlsx");
            });
        }
        function cetakKolektif() {
            const filter = document.getElementById('filterKelas').value;
            const win = window.open('', '_blank');
            win.document.write(`<html><head><title>Cetak</title><style>@page { size: A4; margin: 5mm; } .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; } .card { width: 50mm; height: 82mm; border: 2px solid #312e81; border-radius: 10px; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 5px; page-break-inside: avoid; } .header { background: #312e81; color: white; width: 100%; font-size: 10px; padding: 5px 0; } .photo { width: 20mm; height: 25mm; border: 1px solid #ccc; margin: 10px 0; font-size: 8px; }</style></head><body><div class="grid">`);
            db.ref('kantin_users').once('value', snap => {
                snap.forEach(s => {
                    const d = s.val();
                    if(filter === "SEMUA" || d.kelas === filter) {
                        win.document.write(`<div class="card"><div class="header">SDN 165 TJB</div><div class="photo">FOTO 2x3</div><b style="font-size:10px">${d.nama}</b><small>${d.kelas}</small><div id="qr-${d.id}" style="margin:10px"></div></div>`);
                    }
                });
                win.document.write(`</div><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script><script>`);
                snap.forEach(s => {
                    const d = s.val();
                    if(filter === "SEMUA" || d.kelas === filter) {
                        win.document.write(`new QRCode(document.getElementById("qr-${d.id}"), {text:"${d.id}", width:60, height:60});`);
                    }
                });
                win.document.write(`setTimeout(()=>{window.print();},1000);<\/script></body></html>`);
                win.document.close();
            });
        }
    </script>
</body>
</html>
