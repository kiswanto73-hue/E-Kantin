<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Menu & Penitip - E-Kantin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 p-4 min-h-screen font-sans">

    <div class="max-w-xl mx-auto">
        <div class="bg-indigo-900 text-white p-6 rounded-[2.5rem] shadow-xl mb-6 flex justify-between items-center border-b-8 border-emerald-400">
            <div>
                <h1 class="text-xl font-black italic tracking-tighter uppercase leading-none">Manajemen Kantin 📋</h1>
                <p class="text-[10px] font-bold text-indigo-300 uppercase tracking-widest mt-1">Sistem Bagi Hasil & Penitip</p>
            </div>
            <div class="flex gap-2">
                <button onclick="downloadLaporan()" class="bg-emerald-500 hover:bg-emerald-600 px-4 py-3 rounded-2xl text-[10px] font-black uppercase transition-all shadow-lg text-white">Laporan</button>
                <a href="index.html" class="bg-red-500 hover:bg-red-600 px-4 py-3 rounded-2xl text-[10px] font-black uppercase transition-all shadow-lg">Portal</a>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm mb-8 border border-indigo-50">
            <h3 class="text-[10px] font-black text-indigo-900 mb-4 uppercase italic flex items-center gap-2">
                <span class="bg-indigo-100 p-1 px-2 rounded-lg">✨</span> Input Menu & Nama Penitip
            </h3>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <select id="selectStan" class="p-4 bg-slate-50 rounded-2xl font-black text-xs border-2 border-transparent focus:border-indigo-500 outline-none text-indigo-900">
                        <option value="STAN MAKANAN">🍱 MAKANAN</option>
                        <option value="STAN MINUMAN">🥤 MINUMAN</option>
                        <option value="STAN SNACK">🍪 SNACK</option>
                    </select>
                    <input type="text" id="namaPenitip" placeholder="NAMA PENITIP (CONTOH: BU AMINAH)" class="p-4 bg-amber-50 rounded-2xl font-black text-xs outline-none focus:ring-2 ring-amber-500 uppercase text-amber-700">
                </div>
                
                <input type="text" id="namaMenu" placeholder="NAMA MENU (MISAL: NASI GORENG)" class="w-full p-4 bg-slate-50 rounded-2xl font-black text-xs outline-none focus:ring-2 ring-indigo-500 uppercase">
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1 text-center">
                        <label class="text-[8px] font-black text-slate-400 uppercase">Harga Jual</label>
                        <input type="number" id="hargaMenu" placeholder="1000" class="w-full p-4 bg-slate-50 rounded-2xl font-black text-xs text-center outline-none focus:ring-2 ring-indigo-500">
                    </div>
                    <div class="space-y-1 text-center">
                        <label class="text-[8px] font-black text-rose-400 uppercase italic">Harga Modal (Titip)</label>
                        <input type="number" id="hargaModal" placeholder="900" class="w-full p-4 bg-rose-50 rounded-2xl font-black text-xs text-center outline-none focus:ring-2 ring-rose-500 text-rose-700">
                    </div>
                    <div class="space-y-1 text-center">
                        <label class="text-[8px] font-black text-emerald-500 uppercase">Stok Pagi</label>
                        <input type="number" id="stokAwal" placeholder="50" class="w-full p-4 bg-emerald-50 rounded-2xl font-black text-xs text-center outline-none focus:ring-2 ring-emerald-500 text-emerald-700">
                    </div>
                    <div class="flex items-end">
                        <button onclick="simpanMenu()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-indigo-700 active:scale-[0.98] transition-all uppercase text-[10px]">
                            Simpan 🚀
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="displayMenu" class="space-y-6 pb-20">
            <p class="text-center text-slate-400 italic text-xs py-10">Memuat data menu...</p>
        </div>
    </div>

    <script>
        if (sessionStorage.getItem("ownerLoggedIn") !== "true") { window.location.replace("index.html"); }

        const firebaseConfig = {
            apiKey: "AIzaSyCUjE8WXa8Py4vnojrXDUR3uCvnQEzP6zQ",
            authDomain: "e-kantin-91f0c.firebaseapp.com",
            databaseURL: "https://e-kantin-91f0c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "e-kantin-91f0c",
            storageBucket: "e-kantin-91f0c.firebasestorage.app",
            messagingSenderId: "981834126006",
            appId: "1:981834126006:web:dac8bb0ec1da90549b4c17"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function simpanMenu() {
            const stan = document.getElementById('selectStan').value;
            const penitip = document.getElementById('namaPenitip').value.trim().toUpperCase() || "TANPA NAMA";
            const nama = document.getElementById('namaMenu').value.trim().toUpperCase();
            const harga = parseInt(document.getElementById('hargaMenu').value);
            const modal = parseInt(document.getElementById('hargaModal').value) || 0;
            const awal = parseInt(document.getElementById('stokAwal').value) || 0;

            if (nama && harga) {
                const menuId = nama.replace(/\s+/g, '_');
                db.ref('kantin_menus/' + stan + '/' + menuId).once('value', snapshot => {
                    const dataLama = snapshot.val() || {};
                    const terjualSekarang = dataLama.terjual || 0;
                    db.ref('kantin_menus/' + stan + '/' + menuId).update({
                        nama: nama,
                        penitip: penitip,
                        harga: harga,
                        harga_modal: modal,
                        stok_awal: awal,
                        stok_akhir: (awal - terjualSekarang),
                        terjual: terjualSekarang
                    }).then(() => {
                        alert("✅ DATA " + nama + " BERHASIL DISIMPAN!");
                        clearForm();
                    });
                });
            } else { alert("Isi Nama Menu & Harga!"); }
        }

        function clearForm() {
            document.getElementById('namaMenu').value = "";
            document.getElementById('hargaMenu').value = "";
            document.getElementById('hargaModal').value = "";
            document.getElementById('stokAwal').value = "";
            // Nama penitip tidak dihapus agar kalau input banyak barang milik orang yang sama tidak perlu ngetik ulang
        }

        db.ref('kantin_menus').on('value', snapshot => {
            const container = document.getElementById('displayMenu');
            if(!snapshot.exists()) {
                container.innerHTML = `<p class="text-center text-slate-400 italic text-xs py-10">Belum ada menu.</p>`;
                return;
            }
            let allContent = "";
            snapshot.forEach(stanSnap => {
                const namaStan = stanSnap.key;
                let htmlStan = `<div class="bg-white rounded-[2.5rem] shadow-sm mb-6 border border-slate-100 overflow-hidden">
                    <div class="bg-indigo-50/50 px-6 py-3 border-b border-indigo-50 flex justify-between">
                        <h3 class="text-[9px] font-black text-indigo-500 uppercase tracking-widest">${namaStan}</h3>
                    </div><div class="divide-y divide-slate-50">`;

                stanSnap.forEach(menuSnap => {
                    const m = menuSnap.val();
                    const mId = menuSnap.key;
                    const hModal = m.harga_modal || 0;
                    htmlStan += `
                        <div class="p-5">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <p class="text-[8px] font-bold text-amber-600 uppercase">Penitip: ${m.penitip || 'N/A'}</p>
                                    <p class="text-xs font-black text-slate-800 uppercase italic">${m.nama}</p>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="editForm('${namaStan}','${mId}', '${m.nama}', ${m.harga}, ${hModal}, ${m.stok_awal}, '${m.penitip}')" class="p-2 bg-slate-50 rounded-xl text-xs">✏️</button>
                                    <button onclick="hapusMenu('${namaStan}', '${mId}')" class="p-2 bg-red-50 text-red-400 rounded-xl text-xs">🗑️</button>
                                </div>
                            </div>
                            <div class="flex justify-between items-center text-[10px] font-bold">
                                <span class="text-indigo-600">Laku: ${m.terjual || 0}</span>
                                <span class="text-rose-500">Setor: Rp ${((m.terjual || 0) * hModal).toLocaleString()}</span>
                            </div>
                        </div>`;
                });
                allContent += htmlStan + `</div></div>`;
            });
            container.innerHTML = allContent;
        });

        function editForm(stan, id, nama, harga, modal, awal, penitip) {
            document.getElementById('selectStan').value = stan;
            document.getElementById('namaPenitip').value = penitip || "";
            document.getElementById('namaMenu').value = nama;
            document.getElementById('hargaMenu').value = harga;
            document.getElementById('hargaModal').value = modal;
            document.getElementById('stokAwal').value = awal;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function hapusMenu(stan, id) {
            if (confirm("Hapus menu ini?")) { db.ref('kantin_menus/' + stan + '/' + id).remove(); }
        }

        function downloadLaporan() {
            db.ref('kantin_menus').once('value', snapshot => {
                if (!snapshot.exists()) return;

                // Kumpulkan semua menu ke dalam satu array dulu untuk difilter berdasarkan PENITIP
                let rawData = [];
                snapshot.forEach(stanSnap => {
                    stanSnap.forEach(menuSnap => {
                        const m = menuSnap.val();
                        rawData.push({ ...m, stan: stanSnap.key });
                    });
                });

                // Kelompokkan berdasarkan Nama Penitip
                const perPenitip = rawData.reduce((acc, obj) => {
                    const key = obj.penitip || "TANPA NAMA";
                    if (!acc[key]) acc[key] = [];
                    acc[key].push(obj);
                    return acc;
                }, {});

                let exportData = [];
                let grandTotalSemua = 0;

                Object.keys(perPenitip).forEach(nama => {
                    exportData.push({ "PENITIP": "LAPORAN UNTUK: " + nama });
                    exportData.push({ "PENITIP": "NAMA BARANG", "STAN": "HARGA", "NAMA MENU": "LAKU", "HARGA JUAL": "TOTAL SETOR" });
                    
                    let subTotal = 0;
                    perPenitip[nama].forEach(item => {
                        const totalItem = (item.terjual || 0) * (item.harga_modal || 0);
                        exportData.push({
                            "PENITIP": item.nama,
                            "STAN": item.harga_modal,
                            "NAMA MENU": item.terjual || 0,
                            "HARGA JUAL": totalItem
                        });
                        subTotal += totalItem;
                    });
                    
                    exportData.push({ "PENITIP": "TOTAL YANG HARUS DIBAYAR", "HARGA JUAL": subTotal });
                    exportData.push({}); // Spasi kosong
                    grandTotalSemua += subTotal;
                });

                exportData.push({ "PENITIP": "GRAND TOTAL SETORAN SELURUH PENITIP", "HARGA JUAL": grandTotalSemua });

                const ws = XLSX.utils.json_to_sheet(exportData, { skipHeader: true });
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Laporan_Penitip");
                XLSX.writeFile(wb, `Setoran_Kantin_${new Date().toLocaleDateString()}.xlsx`);
            });
        }
    </script>
</body>
</html>
